services:
  - type: web
    name: ascend-web
    env: static
    buildCommand: cd mobile && npm install && npx expo export -p web
    staticPublishPath: ./mobile/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: EXPO_PUBLIC_SUPABASE_URL
        sync: false
      - key: EXPO_PUBLIC_SUPABASE_ANON_KEY
        sync: false
